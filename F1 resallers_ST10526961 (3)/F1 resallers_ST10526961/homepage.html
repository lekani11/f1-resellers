<script>
/* =========================
   LIVE DATE & TIME
========================= */

function updateDateTime() {
    const now = new Date();

    const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    };

    const el = document.getElementById("datetime");

    if (el) {
        el.textContent = now.toLocaleDateString('en-US', options);
    }
}

updateDateTime();
setInterval(updateDateTime, 1000);
</script>
